version: '3.9'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 3
        aws dynamodb create-table --table-name franchises --attribute-definitions AttributeName=id,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000
        aws dynamodb create-table --table-name branches --attribute-definitions AttributeName=id,AttributeType=S AttributeName=franchiseId,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --global-secondary-indexes '[{"IndexName":"franchiseId-index","KeySchema":[{"AttributeName":"franchiseId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000
        aws dynamodb create-table --table-name products --attribute-definitions AttributeName=id,AttributeType=S AttributeName=branchId,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --global-secondary-indexes '[{"IndexName":"branchId-index","KeySchema":[{"AttributeName":"branchId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000
        echo "Tables created successfully"

  app:
    build: .
    container_name: franchise-api
    ports:
      - "8080:8080"
    depends_on:
      - dynamodb-local
      - dynamodb-init
    restart: on-failure
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE_FRANCHISES: franchises
      DYNAMODB_TABLE_BRANCHES: branches
      DYNAMODB_TABLE_PRODUCTS: products
      SPRING_PROFILES_ACTIVE: local
